<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仏検2級 穴埋め練習</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="仏検穴埋め">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

.header { background: #fff; border-bottom: 0.5px solid #ddd; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; height: 52px; }
.header-left { display: flex; align-items: center; gap: 10px; }
.flag { display: flex; border-radius: 4px; overflow: hidden; width: 28px; height: 20px; flex-shrink: 0; }
.flag-blue  { background: #002395; flex: 1; }
.flag-white { background: #ffffff; flex: 1; border-left: 0.5px solid #eee; border-right: 0.5px solid #eee; }
.flag-red   { background: #ED2939; flex: 1; }
.header-title { font-size: 15px; font-weight: 500; }
.header-right { font-size: 11px; color: #888; }

/* タブ */
.tab-bar { background: #fff; border-bottom: 0.5px solid #eee; display: flex; }
.tab-btn { flex: 1; font-size: 12px; padding: 10px 4px; border: none; background: transparent; color: #888; cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #002395; border-bottom-color: #002395; font-weight: 500; }

.controls { background: #fff; padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 0.5px solid #eee; }
select { font-size: 13px; padding: 6px 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; flex: 1; }
.btn-small { font-size: 12px; padding: 6px 12px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; white-space: nowrap; font-family: inherit; }
.btn-small:active { background: #f0f0f0; }

.progress-bg { height: 3px; background: #e8e8e8; }
.progress-fill { height: 3px; background: linear-gradient(to right, #002395 33%, #fff 33%, #fff 66%, #ED2939 66%); transition: width 0.3s; }

.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 10px 16px; }
.stat { background: #fff; border-radius: 10px; padding: 8px 6px; text-align: center; }
.stat-label { font-size: 10px; color: #888; margin-bottom: 2px; }
.stat-value { font-size: 18px; font-weight: 500; }
.word-count { font-size: 11px; color: #aaa; text-align: right; padding: 3px 16px 0; }

.main { padding: 0 16px 40px; }

/* 今日の復習バナー */
.review-banner { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 14px 16px; margin-top: 12px; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.review-banner-left { font-size: 13px; color: #1a1a1a; }
.review-banner-count { font-size: 20px; font-weight: 500; color: #002395; }
.review-banner-label { font-size: 11px; color: #888; }
.btn-start-review { font-size: 13px; padding: 8px 18px; border: none; border-radius: 8px; background: #002395; color: #fff; cursor: pointer; font-family: inherit; }
.btn-start-review:active { background: #001a70; }

.q-card { background: #fff; border-radius: 14px; border: 0.5px solid #e0e0e0; padding: 20px; margin-bottom: 14px; position: relative; overflow: hidden; margin-top: 12px; }
.q-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(to right, #002395 33%, #fff 33%, #fff 66%, #ED2939 66%); }
.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.q-theme { font-size: 11px; background: #E6F1FB; color: #0C447C; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
.q-level { font-size: 11px; padding: 3px 8px; border-radius: 20px; }
.level-new     { background: #f0f0f0; color: #666; }
.level-again   { background: #FDECEA; color: #8b1a1a; }
.level-soon    { background: #FFF3E0; color: #7c4d00; }
.level-learned { background: #EAF7EE; color: #1a5c32; }
.q-num { font-size: 11px; color: #aaa; }
.q-fr { font-size: 17px; color: #1a1a1a; line-height: 1.8; margin-bottom: 8px; }
.q-ja { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 14px; padding: 8px 12px; background: #f9f8f5; border-radius: 8px; border-left: 3px solid #002395; }
.blank { display: inline-block; min-width: 90px; border-bottom: 2px solid #002395; color: #002395; font-weight: 500; text-align: center; padding: 0 4px; }

.choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.choice-btn { padding: 13px 10px; border: 0.5px solid #ccc; border-radius: 10px; background: #fff; color: #1a1a1a; font-size: 13px; cursor: pointer; text-align: center; font-family: inherit; -webkit-tap-highlight-color: transparent; }
.choice-btn:active:not(:disabled) { background: #f0f0f0; }
.choice-btn.correct { background: #EAF7EE; border-color: #4CAF7D; color: #1a5c32; font-weight: 500; }
.choice-btn.wrong   { background: #FDECEA; border-color: #e57373; color: #8b1a1a; }
.choice-btn:disabled { cursor: default; }

.result-box { border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.result-box.ok { background: #EAF7EE; border: 0.5px solid #4CAF7D; }
.result-box.ng { background: #FDECEA; border: 0.5px solid #e57373; }
.result-msg { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.result-msg.ok { color: #1a5c32; }
.result-msg.ng { color: #8b1a1a; }
.result-hint { font-size: 12px; color: #555; line-height: 1.8; }
.result-hint strong { color: #002395; }

/* ANKIボタン */
.anki-label { font-size: 11px; color: #aaa; text-align: center; margin-bottom: 6px; }
.anki-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.anki-btn { padding: 12px 6px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; border: none; -webkit-tap-highlight-color: transparent; }
.anki-btn:active { opacity: 0.8; }
.anki-perfect { background: #EAF7EE; color: #1a5c32; }
.anki-fuzzy   { background: #FFF3E0; color: #7c4d00; }
.anki-again   { background: #FDECEA; color: #8b1a1a; }

.next-btn { display: block; width: 100%; padding: 14px; border: 0.5px solid #ccc; border-radius: 12px; background: #fff; color: #1a1a1a; font-size: 15px; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
.next-btn:active:not(:disabled) { background: #f0f0f0; }
.next-btn:disabled { opacity: 0.3; cursor: default; }
.star-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 22px; cursor: pointer; padding: 2px 6px; border-radius: 6px; -webkit-tap-highlight-color: transparent; line-height: 1; }
.star-btn:active { transform: scale(0.85); }

.finish-box { background: #fff; border-radius: 14px; border: 0.5px solid #e0e0e0; padding: 36px 20px; text-align: center; margin-top: 12px; position: relative; overflow: hidden; }
.finish-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(to right, #002395 33%, #fff 33%, #fff 66%, #ED2939 66%); }
.finish-flag { display: flex; width: 48px; height: 32px; border-radius: 4px; overflow: hidden; margin: 12px auto 16px; }
.finish-title { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
.finish-sub   { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 2; white-space: pre-line; }
.finish-btns  { display: flex; flex-direction: column; gap: 10px; }
.btn-again { padding: 14px; border: 0.5px solid #ccc; border-radius: 12px; background: #fff; color: #1a1a1a; font-size: 15px; cursor: pointer; font-family: inherit; }
.btn-review-only { padding: 14px; border: 0.5px solid #002395; border-radius: 12px; background: #fff; color: #002395; font-size: 15px; cursor: pointer; font-family: inherit; }

/* 統計タブ */
.stats-tab { padding: 12px 16px; }
.stats-card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0e0; padding: 16px; margin-bottom: 10px; }
.stats-card-title { font-size: 12px; color: #888; margin-bottom: 12px; font-weight: 500; }
.level-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid #f0f0f0; font-size: 13px; }
.level-row:last-child { border-bottom: none; }
.level-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.upcoming-item { font-size: 12px; color: #555; padding: 6px 0; border-bottom: 0.5px solid #f0f0f0; display: flex; justify-content: space-between; }
.upcoming-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="flag"><div class="flag-blue"></div><div class="flag-white"></div><div class="flag-red"></div></div>
    <div class="header-title">仏検2級 穴埋め練習</div>
  </div>
  <div class="header-right" id="header-right">読み込み中...</div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('practice')">📝 練習</button>
  <button class="tab-btn" onclick="switchTab('review')">🔄 復習</button>
  <button class="tab-btn" onclick="switchTab('stats')">📊 統計</button>
</div>

<!-- 練習タブ -->
<div id="tab-practice">
  <div class="controls">
    <select id="theme-select">
      <option value="all">すべてのテーマ</option>
      <option value="star">⭐ スター登録問題</option>
      <optgroup label="&#128218; 語彙">
      <option value="場所">&#128218; 場所 (Ex.4 p.43)</option>
      <option value="交通・住まい">&#128218; 交通・住まい (Ex.38 p.111)</option>
      <option value="語彙：時">&#128218; 語彙：時 (Ex.1-3 p.36-41)</option>
      <option value="語彙：位置">&#128218; 語彙：位置 (Ex.5 p.45)</option>
      <option value="語彙：方向と形">&#128218; 語彙：方向と形 (Ex.6 p.47)</option>
      <option value="語彙：文書・娯楽・食事・建物">&#128218; 語彙：文書・娯楽・食事・建物 (Ex.37 p.109)</option>
        <option value="語彙：部分">&#128218; 語彙：部分 (Ex.8 p.49)</option>
      <option value="語彙：状態">&#128218; 語彙：状態 (Ex.9 p.53)</option>
      <option value="語彙：数量・有無">&#128218; 語彙：数量・有無 (Ex.7 p.51)</option>
            <option value="語彙：記号・方法">&#128218; 語彙：記号・方法 (Ex.36 p.107)</option>
      <option value="語彙：状態(2)・価値">&#128218; 語彙：状態(2)・価値 (Ex.10 p.55)</option>
</optgroup>
      <optgroup label="&#128203; 動詞">
      <option value="動詞：生死・危険">&#128203; 動詞：生死・危険 (Ex.1 p.117)</option>
      <option value="動詞：通行・移動">&#128203; 動詞：通行・移動 (Ex.2 p.119)</option>
      <option value="動詞：去来・出入り">&#128203; 動詞：去来・出入り (Ex.3 p.121)</option>
      <option value="動詞：接近・昇降">&#128203; 動詞：接近・昇降 (Ex.4 p.123)</option>
      <option value="動詞：離合・到達">&#128203; 動詞：離合・到達 (Ex.5 p.125)</option>
      <option value="動詞：接続・出し入れ">&#128203; 動詞：接続・出し入れ (Ex.6 p.127)</option>
      <option value="動詞：変化・調整">&#128203; 動詞：変化・調整 (Ex.7 p.129)</option>
        <option value="動詞：構成・過不足">&#128203; 動詞：構成・過不足 (Ex.8 p.130)</option>
      <option value="動詞：増減・存廃">&#128203; 動詞：増減・存廃 (Ex.9 p.133)</option>
      </optgroup>
      <optgroup label="&#128205; 前置詞">
      <option value="前置詞：場所">&#128205; 前置詞：場所 (Ex.1-3 p.5-9)</option>
      <option value="前置詞：時">&#128205; 前置詞：時 (Ex.4 p.10-11)</option>
      <option value="前置詞：対象">&#128205; 前置詞：対象 (Ex.5 p.12)</option>
        <option value="前置詞：状態">&#128205; 前置詞：状態 (Ex.6 p.15)</option>
      <option value="前置詞：状態(2)">&#128205; 前置詞：状態(2) (Ex.7 p.17)</option>
      <option value="前置詞：原因・手段">&#128205; 前置詞：原因・手段 (Ex.8 p.19)</option>
      </optgroup>
    </select>
    <button class="btn-small" onclick="startPractice()">スタート</button>
  </div>
  <div class="progress-bg"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">残り</div><div class="stat-value" id="s-remain">-</div></div>
    <div class="stat"><div class="stat-label">正解</div><div class="stat-value" id="s-ok" style="color:#2e7d4f;">0</div></div>
    <div class="stat"><div class="stat-label">不正解</div><div class="stat-value" id="s-ng" style="color:#c0392b;">0</div></div>
    <div class="stat"><div class="stat-label">復習待ち</div><div class="stat-value" id="s-due">0</div></div>
  </div>
  <div class="word-count" id="word-count"></div>
  <div class="main">
    <div id="main-area">
      <div class="q-card" style="position:relative;">
        <button class="star-btn" id="star-btn" onclick="toggleStar()" title="スターをつける">☆</button>
        <div class="q-meta">
          <span class="q-theme" id="q-theme">-</span>
          <span class="q-num" id="q-num">-</span>
        </div>
        <div class="q-fr" id="q-fr">テーマを選んでスタートしてください</div>
        <div class="q-ja" id="q-ja"></div>
      </div>
      <div class="choices-grid" id="choices"></div>
      <div id="result-row"></div>
      <div class="anki-label" id="anki-label" style="display:none;">この問題の理解度は？</div>
      <div class="anki-btns" id="anki-btns" style="display:none;">
        <button class="anki-btn anki-again" onclick="ankiRate('again')">❌ わからない<br><small>すぐ再出題</small></button>
        <button class="anki-btn anki-fuzzy" onclick="ankiRate('fuzzy')">🔶 うろ覚え<br><small>2日後</small></button>
        <button class="anki-btn anki-perfect" onclick="ankiRate('perfect')">✅ 完璧<br><small>7日後</small></button>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextCard()" disabled style="display:none;">次の問題へ →</button>
    </div>
    <div id="finish-area" style="display:none;">
      <div class="finish-box">
        <div class="finish-flag"><div style="background:#002395;flex:1;"></div><div style="background:#fff;flex:1;border-left:0.5px solid #eee;border-right:0.5px solid #eee;"></div><div style="background:#ED2939;flex:1;"></div></div>
        <div class="finish-title" id="finish-title"></div>
        <div class="finish-sub" id="finish-sub"></div>
        <div class="finish-btns">
          <button class="btn-again" onclick="startPractice()">もう一度</button>
          <button class="btn-review-only" onclick="switchTab('review')">復習タブへ</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 復習タブ -->
<div id="tab-review" style="display:none;">
  <div class="main">
    <div class="review-banner">
      <div class="review-banner-left">
        <div class="review-banner-count" id="due-count">0</div>
        <div class="review-banner-label">今日の復習問題</div>
      </div>
      <button class="btn-start-review" onclick="startReview()">復習スタート</button>
    </div>
    <div id="review-area" style="display:none;">
      <div class="q-card" style="margin-top:0;position:relative;">
        <button class="star-btn" id="r-star-btn" onclick="toggleReviewStar()" title="スターをつける">☆</button>
        <div class="q-meta">
          <span class="q-theme" id="rq-theme">-</span>
          <span class="q-level" id="rq-level">-</span>
        </div>
        <div class="q-fr" id="rq-fr"></div>
        <div class="q-ja" id="rq-ja"></div>
      </div>
      <div class="choices-grid" id="r-choices"></div>
      <div id="r-result-row"></div>
      <div class="anki-label" id="r-anki-label" style="display:none;">この問題の理解度は？</div>
      <div class="anki-btns" id="r-anki-btns" style="display:none;">
        <button class="anki-btn anki-again" onclick="reviewAnkiRate('again')">❌ わからない<br><small>すぐ再出題</small></button>
        <button class="anki-btn anki-fuzzy" onclick="reviewAnkiRate('fuzzy')">🔶 うろ覚え<br><small>2日後</small></button>
        <button class="anki-btn anki-perfect" onclick="reviewAnkiRate('perfect')">✅ 完璧<br><small>7日後</small></button>
      </div>
    </div>
    <div id="review-done" style="display:none;">
      <div class="finish-box" style="margin-top:0;">
        <div class="finish-flag"><div style="background:#002395;flex:1;"></div><div style="background:#fff;flex:1;border-left:0.5px solid #eee;border-right:0.5px solid #eee;"></div><div style="background:#ED2939;flex:1;"></div></div>
        <div class="finish-title">復習完了！</div>
        <div class="finish-sub" id="review-done-sub"></div>
      </div>
    </div>
  </div>
</div>

<!-- 統計タブ -->
<div id="tab-stats" style="display:none;">
  <div class="stats-tab">
    <!-- カウントダウン＋X投稿 -->
    <div class="stats-card" style="background:linear-gradient(135deg,#002395 0%,#1a3fbb 50%,#ED2939 100%);border:none;padding:18px 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-size:11px;color:rgba(255,255,255,0.75);margin-bottom:4px;">🇫🇷 仏検2級まで</div>
          <div style="font-size:40px;font-weight:700;color:#fff;line-height:1;" id="days-count">-</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.8);">日　（6月21日）</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:rgba(255,255,255,0.75);margin-bottom:4px;">習得済み</div>
          <div style="font-size:32px;font-weight:700;color:#fff;line-height:1;" id="x-learned-count">-</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.75);">/ <span id="x-total-count">-</span> 問</div>
        </div>
      </div>
      <button onclick="postToX()" style="width:100%;padding:12px;border:none;border-radius:10px;background:#000;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Xに勉強宣言を投稿
      </button>
    </div>

    <div class="stats-card">
      <div class="stats-card-title">📊 習得レベル分布</div>
      <div id="level-dist"></div>
    </div>
    <div class="stats-card">
      <div class="stats-card-title">🗓 今後の復習予定</div>
      <div id="upcoming-list"></div>
    </div>
    <div class="stats-card">
      <div class="stats-card-title">ℹ️ 復習システムについて</div>
      <div style="font-size:12px;color:#555;line-height:1.8;">
        ✅ <b>完璧</b>：7日後に再出題<br>
        🔶 <b>うろ覚え</b>：2日後に再出題<br>
        ❌ <b>わからない</b>：次の復習セッションで即出題<br><br>
        復習タブでは「今日が期限の問題」だけが出てきます。毎日少しずつ復習することで効率よく定着します。
      </div>
    </div>
  </div>
</div>

<script>
/* =====================================================
   問題データ（毎日ここに追加）
===================================================== */
const QUESTIONS = [
  /* --- 場所 Ex.4 p.43 (5/4) --- */

  {id:"p21-4",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Dans cette exposition, il y a, (__) autres, quelques œuvres de Picasso.",ja:"この展覧会には、なかでもピカソの作品がいくつかある。",answer:"entre",choices:["entre","parmi","sur","par"],hint:"entre autres で「なかでも、とりわけ」という慣用表現。"},
  {id:"p21-5",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Il ne dort que cinq heures (__) nuit.",ja:"彼は一晩に5時間しか眠らない。",answer:"par",choices:["par","sur","dans","parmi"],hint:"par は「…につき、当たり」。par nuit で「一晩につき」。"},
  {id:"p21-6",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Ce professeur a été très populaire (__) ses élèves.",ja:"この先生は生徒たちにとても人気があった。",answer:"parmi",choices:["parmi","entre","pour","sur"],hint:"parmi は「3つ以上のものをさす名詞…のなかで（選択）」。parmi ses élèves で「生徒たちの間で」。"},
  {id:"p21-7",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Cette table mesure combien de mètres (__) long ?",ja:"このテーブルは長さ何メートルですか？",answer:"de",choices:["de","sur","par","pour"],hint:"de は「…だけ」の程度を表す。combien de mètres de long で「長さ何メートル」。"},
  {id:"p21-8",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Il fait un peu frais (__) la saison.",ja:"季節の割には少し肌寒い。",answer:"pour",choices:["pour","par","sur","de"],hint:"pour は「対比（…にしては）」を表す。pour la saison で「この季節にしては」。"},
  {id:"p21-9",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Il mange toujours les huîtres (__) douzaine.",ja:"彼はいつも牡蠣を12個単位で食べる。",answer:"par",choices:["par","sur","pour","de"],hint:"par は「…につき、当たり」。par douzaine で「1ダースにつき（12個単位で）」。"},
  {id:"p21-10",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Son studio mesure sept mètres (__) cinq.",ja:"彼のスタジオは7メートル×5メートルです。",answer:"sur",choices:["sur","par","de","pour"],hint:"sur は「比率」を表す。sept mètres sur cinq で「7メートル×5メートル」（面積の表現）。"},
  {id:"p21-11",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Il a été sélectionné (__) cent candidats.",ja:"彼は100人の候補者の中から選ばれた。",answer:"parmi",choices:["parmi","entre","par","pour"],hint:"parmi は「3つ以上のものをさす名詞…のなかで（選択）」。parmi cent candidats で「100人の候補者の中から」。"},
  {id:"p21-12",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"J'ai longtemps hésité (__) plusieurs solutions.",ja:"私はいくつもの解決策のなかで長い間迷った。",answer:"entre",choices:["entre","parmi","de","par"],hint:"entre は「2つのものをさす名詞…のあいだに」または「3つ以上のものをさす名詞…のなかで」。entre plusieurs solutions で「複数の解決策の間で」。"},
  {id:"p21-13",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"(__) l'achat de cinq pommes, la sixième est gratuite.",ja:"リンゴを5個買えば、6個目は無料です。",answer:"pour",choices:["pour","par","sur","de"],hint:"pour は「…につき、ひきかえに」。pour l'achat de cinq pommes で「リンゴ5個の購入につき」。"},
  {id:"p21-14",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"La population a augmenté (__) 0,5 % depuis l'an dernier.",ja:"人口は昨年から0.5パーセント増加した。",answer:"de",choices:["de","par","sur","pour"],hint:"de は「…だけ（程度・差）」。augmenté de 0,5 % で「0.5%増加した」。"},
  {id:"p21-15",theme:"数量を表わす前置詞",exercice:"Ex.9",date:"5/10",fr:"Ma fille ne travaille qu'une heure (__) jour.",ja:"娘は1日に1時間しか働かない。",answer:"par",choices:["par","sur","de","pour"],hint:"par は「…につき、当たり」。par jour で「1日につき」。"},

  /* --- 価値 (5/10) --- */
  {id:"p57-1",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Ça vaut la (__) de visiter ce musée.",ja:"この美術館は行ってみる価値がある。",answer:"peine",choices:["peine","valeur","prix","besoin"],hint:"valoir la peine de + 不定詞で「…する価値がある」という慣用表現。"},
  {id:"p57-2",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Ce médicament est très (__) contre le rhume.",ja:"この薬は風邪によく効く。",answer:"efficace",choices:["efficace","valable","raisonnable","vrai"],hint:"efficace は「有効な、有能な」。être efficace contre で「…に効果のある」。"},
  {id:"p57-3",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Ce terrain a doublé de (__) en dix ans.",ja:"10年間で、この土地は2倍に値上がりした。",answer:"valeur",choices:["valeur","prix","peine","besoin"],hint:"valeur は「価値、能力」。doubler de valeur で「価値が2倍になる」。"},
  {id:"p57-4",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Cette voiture d'occasion coûte dix mille euros. C'est un prix (__).」",ja:"この中古車は1万ユーロする。妥当な価格です。",answer:"raisonnable",choices:["raisonnable","payant","vrai","valable"],hint:"raisonnable は「良識的な、手ごろな」。un prix raisonnable で「手ごろな価格」。"},
  {id:"p57-5",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Elle n'est pas venue au rendez-vous : à (__) dire, je m'y attendais.",ja:"彼女は約束の場所に来なかった。じつはそんなことだろうと思っていた。",answer:"vrai",choices:["vrai","bon","beau","soi"],hint:"à vrai dire で「じつを言うと」という慣用表現。"},
  {id:"p57-6",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Il faut retrouver le voleur à tout (__) .",ja:"どうしてもその泥棒を見つけなければならない。",answer:"prix",choices:["prix","peine","soi","vain"],hint:"à tout prix で「どんなことがあっても、なんとしても」という慣用表現。"},
  {id:"p57-7",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"J'ai cherché en (__) à la voir hier.",ja:"私はきのう彼女に会おうとしたがだめだった。",answer:"vain",choices:["vain","beau","soi","besoin"],hint:"en vain で「むだに」。chercher en vain で「むだに探す＝見つけられなかった」。"},
  {id:"p57-8",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"J'ai eu (__) courir, je n'ai pas pu attraper l'autobus.",ja:"走ったけどだめだった。バスにはまにあわなかった。",answer:"beau",choices:["beau","vain","besoin","peine"],hint:"avoir beau + 不定詞で「いくら…してもむだである」という慣用表現。"},
  {id:"p57-9",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"L'entrée est (__) pour les enfants de plus de quinze ans.",ja:"入場は15歳以上の子どもについては有料です。",answer:"payante",choices:["payante","valable","raisonnable","mauvais"],hint:"payant, e は「有料の」。les places gratuites et les places payantes（無料席と有料席）。"},
  {id:"p57-10",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Mes chaussures sont (__) marché que les tiennes.",ja:"私の靴は君のものより安い。",answer:"meilleur",choices:["meilleur","bon","mauvais","vrai"],hint:"bon marché（安い）の比較級はmeilleur marché。「より安い」。"},
  {id:"p57-11",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"— Oui, bien sûr. Cela va de (__) .",ja:"もちろんさ。あたりまえだよ。",answer:"soi",choices:["soi","vrai","prix","peine"],hint:"Cela va de soi で「それは当然のことである」（= Cela va sans dire）という慣用表現。"},
  {id:"p57-12",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Tu n'as pas écrit la (__) adresse ?",ja:"君は住所をまちがえて書いたんじゃない？",answer:"bonne",choices:["bonne","mauvaise","vraie","valable"],hint:"bonne adresse は「正確な住所」。mauvaise adresse はまちがった住所の含意がある。"},
  {id:"p57-13",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Votre carte d'identité n'est plus (__) .",ja:"あなたの身分証明書は有効期限がきれている。",answer:"valable",choices:["valable","valeur","efficace","raisonnable"],hint:"valable は「有効な」。Ce billet est valable quatre jours.（この切符は4日間有効）。"},
  {id:"p57-14",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Vous avez fait un (__) numéro de téléphone.",ja:"電話番号をおまちがえですよ。",answer:"mauvais",choices:["mauvais","faux","beau","vrai"],hint:"mauvais は「悪い、まずい」。un mauvais numéro で「まちがった番号」。"},
  {id:"p57-15",theme:"価値",exercice:"Ex.11",date:"5/10",fr:"Vous n'avez pas (__) de lui donner les détails de l'accident.",ja:"事故の詳細を彼に教えるにはおよびませんよ。",answer:"besoin",choices:["besoin","peine","vain","prix"],hint:"avoir besoin de + 不定詞で「…が必要だ」。ne pas avoir besoin de で「…には及ばない」。"},

  /* --- 類型 (5/10) --- */
  {id:"p59-1",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Cette chanson est très à la (__) en ce moment.",ja:"このシャンソンはいまとても流行っている。",answer:"mode",choices:["mode","commun","genre","sorte"],hint:"à la mode で「流行している」という慣用表現。"},
  {id:"p59-2",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Charles a la même taille (__) ton frère.",ja:"シャルルは君のお兄さんと同じ身長です。",answer:"que",choices:["que","comme","ainsi","commun"],hint:"même … que で「…と同じ」。la même taille que で「…と同じ身長」。"},
  {id:"p59-3",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Daniel est venu en utilisant les transports en (__) .",ja:"ダニエルは公共の交通機関を使ってやってきた。",answer:"commun",choices:["commun","genre","sorte","commun"],hint:"les transports en commun で「公共交通機関」。commun は「共通の、ありふれた」。"},
  {id:"p59-4",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Elle ne s'est jamais montrée (__) qu'elle est.",ja:"彼女はありのままの自分を見せたことが1度もない。",answer:"telle",choices:["telle","même","ainsi","comme"],hint:"tel quel で「そのままの」。telle qu'elle est で「彼女がそうであるがままに」。"},
  {id:"p59-5",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Il a trouvé une nouvelle méthode pas (__) les autres pour résoudre ce problème.",ja:"彼はこの問題を解決するために他とはちがう新しい方法を見つけた。",answer:"comme",choices:["comme","ainsi","telle","commun"],hint:"comme は「…と同じように、…として」。pas comme les autres で「他とは違う」。"},
  {id:"p59-6",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"J'avais pour camarade de classe une (__) Corinne.",ja:"私はクラスメイトにコリーヌとかいう人がいた。",answer:"certaine",choices:["certaine","autre","même","telle"],hint:"certain, e（不定冠詞付き）は「ある…（名前が分かるが聞き手には不明な人）」。une certaine Corinne で「コリーヌという人」。"},
  {id:"p59-7",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Nous dînons en ville de temps à (__) .",ja:"私たちはときどき外食する。",answer:"autre",choices:["autre","même","commun","sorte"],hint:"de temps à autre で「ときどき」という慣用表現（= de temps en temps）。"},
  {id:"p59-8",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Prends le parapluie, (__) que l'imperméable.",ja:"傘を持って行きなさい。それからレインコートも。",answer:"ainsi",choices:["ainsi","comme","tel","même"],hint:"ainsi que で「…と同様に、…と一緒に」という慣用表現。"},
  {id:"p59-9",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Prenez (__) sur Nathalie, regardez comme elle est studieuse.",ja:"ナタリーを見習いなさい。彼女がどれほど勉強か見てみなさい。",answer:"exemple",choices:["exemple","modèle","genre","sorte"],hint:"prendre exemple sur qn で「（人）を手本にする、見習う」という慣用表現。"},
  {id:"p59-10",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Sarah n'a rien de (__) avec sa mère.",ja:"サラは母親と少しも似たところがない。",answer:"commun",choices:["commun","même","égal","genre"],hint:"n'avoir rien de commun avec で「…と共通点が何もない」。commun à qc/qn で「…に共通する」。"},
  {id:"p59-11",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Si ça vous est (__) , alors, je décide : on va au cinéma !",ja:"もしあなたがどちらでもいいのなら、映画へ行くことにします！",answer:"égal",choices:["égal","même","commun","tel"],hint:"Ça m'est égal で「それは私にはどうでもよい」という慣用表現。"},
  {id:"p59-12",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Tiens-toi (__) il faut.",ja:"行儀よくしなさい。",answer:"comme",choices:["comme","ainsi","tel","même"],hint:"comme il faut で「きちんと、行儀よく」という慣用表現。"},
  {id:"p59-13",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Tout le monde doit assister à la réunion, (__) faite pour les malades.",ja:"病人を除く全員が会議に出席しなければならない。",answer:"exception",choices:["exception","sorte","genre","commun"],hint:"à l'exception de qn/qc で「…を除いて」という慣用表現。"},
  {id:"p59-14",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"Toutes ces histoires ne me (__) pas.",ja:"その話はどれもぼくには関係ないことだよ。",answer:"regardent",choices:["regardent","concernent","touchent","intéressent"],hint:"Ça ne me regarde [concerne] pas で「それは私には関係ない」という慣用表現。regarder には「関係する」の意味がある。"},
  {id:"p59-15",theme:"類型",exercice:"Ex.12",date:"5/10",fr:"— Il est pas mal, mais ce n'est pas mon (__) .",ja:"— 彼は悪くないけど、私の好みじゃないわ。",answer:"genre",choices:["genre","type","modèle","sorte"],hint:"genre は「種類、態度、好み」。Cet individu n'est pas mon genre で「あいつは私の好みではない」。"},

  /* --- 程度（１） (5/10) --- */
  {id:"p61-1",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"À (__) de trois mille euros, je refuse cet arrangement.",ja:"3000ユーロ以下なら、私はこの示談を受け入れません。",answer:"moins",choices:["moins","plus","moindre","point"],hint:"à moins de + 数量表現で「…以下なら（…でないかぎり）」。"},
  {id:"p61-2",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Combien coûte le voyage en avion ? —Au (__) , cent cinquante euros.",ja:"飛行機の旅費はいくらになりますか？ —せいぜい150ユーロです。",answer:"plus",choices:["plus","moins","point","tant"],hint:"au plus で「最大限、せいぜい」（→ au moins「少なくとも」）。"},
  {id:"p61-3",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Elle n'a pas la (__) idée de ce qui s'est passé.",ja:"彼女にはなにが起こったのかまったく見当がつかない。",answer:"moindre",choices:["moindre","moins","plus","point"],hint:"la moindre des choses で「最小限のこと」。ne pas avoir la moindre idée で「まったく見当がつかない」。"},
  {id:"p61-4",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Émilie restera chez elle demain, à (__) que le temps ne s'améliore.",ja:"エミリーは天気が好転しないかぎり、あすは出かけない。",answer:"moins",choices:["moins","plus","moindre","tant"],hint:"à moins que + 接続法で「…でないかぎり」。"},
  {id:"p61-5",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Fais attention, ta valise est sur le (__) de tomber.",ja:"注意して、スーツケースが落ちそうだよ。",answer:"point",choices:["point","tant","plus","trop"],hint:"être sur le point de + 不定詞で「今にも…するところである」。"},
  {id:"p61-6",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Il faisait froid à tel (__) que les rivières étaient gelées.",ja:"川が凍ってしまうほど寒かった。",answer:"point",choices:["point","tant","excès","trop"],hint:"à ce point / à tel point que + 直説法で「これほどまでに…するほど」。"},
  {id:"p61-7",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"La situation est-elle à ce (__) critique ?",ja:"状況はそんなに差し迫っているの？",answer:"point",choices:["point","tant","plus","trop"],hint:"à ce point で「これほどまでに、そんなに」（= à quel point どれほど）。"},
  {id:"p61-8",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Le médecin m'a interdit tout (__) de boisson.",ja:"私は医者から飲み過ぎを禁じられた。",answer:"excès",choices:["excès","trop","tant","plus"],hint:"excès は「過度」。à l'excès（= trop）で「過度に」。un excès de boisson で「飲み過ぎ」。"},
  {id:"p61-9",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Le stade était bondé de spectateurs. —(__) que ça !",ja:"スタジアムは観客でうまっていたよ。—そんなに！",answer:"tant",choices:["tant","trop","plus","point"],hint:"tant は「それほど（多く）」。Tant que ça ! で「そんなに！」と驚きを表す。"},
  {id:"p61-10",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Ne parle pas si (__) ! J'ai mal à la tête.",ja:"そんなに大きな声で話さないで！頭が痛いんだから。",answer:"fort",choices:["fort","trop","excès","tant"],hint:"fort は副詞で「強く、大きな声で」。Parlez plus fort ! で「もっと大きな声で話してください」。"},
  {id:"p61-11",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"(__) qu'à faire, je préfère aller dans un bon restaurant.",ja:"どうせならいいレストランへ行きたい。",answer:"Tant",choices:["Tant","Plus","Moins","Trop"],hint:"Tant qu'à faire で「どうせするなら、せっかくだから」という慣用表現。"},
  {id:"p61-12",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Penses-y le (__) souvent possible, tu oublieras.",ja:"できるだけそのことを考えないようにしなさい。そうすればいずれ忘れるよ。",answer:"moins",choices:["moins","plus","moindre","point"],hint:"le moins … possible で「できるだけ…しない」。le plus … possible で「できるだけ…する」。"},
  {id:"p61-13",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Plus il s'explique, (__) on comprend ses raisons.",ja:"彼が弁解すればするほど、彼の言い分がわからなくなる。",answer:"moins",choices:["moins","plus","tant","trop"],hint:"plus…, moins… で「…すればするほど、ますます…でなくなる」という比例表現。"},
  {id:"p61-14",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Pour faire la cuisine, elle met deux fois (__) de temps que moi.",ja:"彼女は料理に私より倍の時間をかける。",answer:"plus",choices:["plus","moins","tant","trop"],hint:"deux fois plus de + 名詞 + que で「…より2倍多くの…」。"},
  {id:"p61-15",theme:"程度（１）",exercice:"Ex.13",date:"5/10",fr:"Vous vous êtes trompé en me rendant la monnaie, il y a un euro de (__) .",ja:"あなたはおつりをまちがいました。1ユーロ多すぎる。",answer:"trop",choices:["trop","plus","excès","tant"],hint:"de trop で「余分の、多すぎる」。un euro de trop で「1ユーロ多すぎる」。"},

  /* --- 話・目的・理由 (5/10) --- */
  {id:"p105-1",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Ce n'est pas une (__) pour manquer à ta parole.",ja:"だからといって約束を破っていいことにはならないよ。",answer:"raison",choices:["raison","prétexte","principe","histoire"],hint:"raison は「理由」。Ce n'est pas une raison pour + 不定詞で「だからといって…していいわけにはならない」。"},
  {id:"p105-2",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Elle a pris (__) de la fatigue pour ne pas venir.",ja:"彼女は疲れているからといって来なかった。",answer:"prétexte",choices:["prétexte","raison","compte","principe"],hint:"prétexte は「口実」。prendre prétexte de qc pour + 不定詞で「…を口実にして…する」。"},
  {id:"p105-3",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Elle ne s'entend pas avec son patron, elle a souvent des (__) avec lui.",ja:"彼女は上司とそりがあわない。２人はよくもめる。",answer:"histoires",choices:["histoires","raisons","principes","comptes"],hint:"histoire は「物語、出来事、歴史」。avoir des histoires avec qn で「（人）ともめごとを起こす」。"},
  {id:"p105-4",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Étant (__) qu'il pleut, on ne sort pas.",ja:"雨が降っているので、外出できない。",answer:"donné",choices:["donné","dit","entendu","admis"],hint:"étant donné que + 直説法で「…から考えて、なので」という理由を表す表現。"},
  {id:"p105-5",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Il ne m'a jamais salué, c'est (__) je le déteste.",ja:"彼は私にあいさつしたことがない、だから彼が大嫌いだ。",answer:"pourquoi",choices:["pourquoi","raison","compte","prétexte"],hint:"c'est pourquoi で「そういうわけで、だから…」という結果を表す接続詞的表現。"},
  {id:"p105-6",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Il n'est pas venu au rendez-vous. Il (__) .",ja:"彼は約束の場所に来なかった。あんまりだよ。",answer:"exagère",choices:["exagère","dépasse","ment","court"],hint:"exagérer は「誇張する、度を過ごす」。Lui, pauvre ? N'exagérons rien ! で「彼が貧乏だって？それは言いすぎでしょう！」。"},
  {id:"p105-7",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Ils viennent justement de partir dans le (__) de vous rencontrer.",ja:"彼らはあなたと会うためにたったいま出発したところだ。",answer:"but",choices:["but","objet","principe","porte"],hint:"but は「目的、ゴール」。dans le but de + 不定詞で「…する目的で」（= pour, afin de）。"},
  {id:"p105-8",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Jade parle beaucoup, mais elle ne se rend pas (__) de ce qu'elle dit.",ja:"ジャドはさかんに話すけれど、自分でなにを言っているのかわかっていない。",answer:"compte",choices:["compte","raison","sens","idée"],hint:"se rendre compte de qc で「…に気づく、を理解する」という慣用表現。"},
  {id:"p105-9",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"J'ai pour (__) de répondre à toutes les cartes que je reçois.",ja:"私は主義としてうけとる絵はがきには全部返事を書くことにしている。",answer:"principe",choices:["principe","raison","but","règle"],hint:"avoir pour principe de + 不定詞で「原則として…する」。en principe で「原則的には」。"},
  {id:"p105-10",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Le bruit (__) qu'une centaine d'emplois vont être supprimés.",ja:"100名ほどの従業員がやめさせられるという噂が流れている。",answer:"court",choices:["court","circule","dit","tourne"],hint:"bruit は「物音、うわさ」。le bruit court [circule] que + 直説法で「…というウワサが流れている」。"},
  {id:"p105-11",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Le (__) , c'est d'améliorer les conditions de travail.",ja:"肝心なのは労働条件を改善することだ。",answer:"principal",choices:["principal","but","objet","principe"],hint:"principal は「重要なこと」（名詞）。le principal est de + 不定詞で「大事なのは…することだ」。"},
  {id:"p105-12",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Le divorce du président de la République a fait l'(__) de nombreux articles dans les journaux.",ja:"大統領の離婚は新聞で数多くとりあげられた。",answer:"objet",choices:["objet","but","sujet","titre"],hint:"objet は「もの、目的」。faire l'objet de qc で「…の対象になる」（= être discuté）。"},
  {id:"p105-13",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Mathis a quitté son travail en (__) de son mauvais état de santé.",ja:"健康状態がおもわしくなかったので、マチスは仕事をやめた。",answer:"raison",choices:["raison","cause","prétexte","principe"],hint:"en raison de qc で「…の理由で（= à cause de）」。"},
  {id:"p105-14",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"Son exposé (__) sur le marché de l'automobile.",ja:"彼の発表は自動車市場を対象としている。",answer:"porte",choices:["porte","tourne","roule","tient"],hint:"porter sur + 対象で「…を対象とする、について論じる」。La discussion porte sur l'éducation des enfants.（議論の対象は子どもの教育である）。"},
  {id:"p105-15",theme:"話・目的・理由",exercice:"Ex.35",date:"5/10",fr:"« Tu peux me prêter de l'argent ? » « (__) pas ? »",ja:"「お金を貸してくれる？」「いいよ。」",answer:"Pourquoi",choices:["Pourquoi","Comment","Quoi","Bien"],hint:"Pourquoi pas ? で「いいですよ（どうしてだめなんですか）」という肯定・同意の慣用表現。"},

  /* --- 開始・断続 (5/10) --- */
  {id:"p135-1",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"On n'en (__) jamais avec cette affaire.",ja:"この件はいつまでたっても解決しない。",answer:"finira",choices:["finira","commencera","continuera","reprendra"],hint:"en finir avec qc/qn で「…に決着をつける」。"},
  {id:"p135-2",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"Le nombre d'habitants de ce village (__) à diminuer.",ja:"この村の人口は減り続けている。",answer:"continue",choices:["continue","commence","reprend","finit"],hint:"continuer à [de] + 不定詞で「…し続ける（← cesser）」。"},
  {id:"p135-3",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"La maison ne (__) ni échange les disques vendus.",ja:"バーゲン品は返品も交換もきかない。",answer:"reprend",choices:["reprend","finit","commence","s'arrête"],hint:"reprendre は「ふたたびとる、再開する」。Les articles soldés ne sont pas ni repris ni échangés.（バーゲン品は返品も交換もきかない）。"},
  {id:"p135-4",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"(__) à faire tes devoirs.",ja:"宿題をやり直しなさい。",answer:"Recommence",choices:["Recommence","Commence","Continue","Reprends"],hint:"recommencer à + 不定詞で「ふたたび…し始める（= commencer de nouveau）」。"},
  {id:"p135-5",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"J'ai faim, je voudrais qu'on (__) ici pour déjeuner.",ja:"お腹がすいた。ここで昼食のために止まりたい。",answer:"s'arrête",choices:["s'arrête","commence","finisse","reprenne"],hint:"s'arrêter は「止まる、立ち止まる」。s'arrêter de + 不定詞で「…するのをやめる」。"},
  {id:"p135-6",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"Le bébé ne (__) pas de pleurer.",ja:"赤ちゃんが泣き止まない。",answer:"cesse",choices:["cesse","finit","arrête","continue"],hint:"cesser de + 不定詞で「…するのをやめる（= arrêter de）」。ne pas cesser de で「…し続ける」。"},
  {id:"p135-7",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"Les policiers (__) les rues qui mènent au pont.",ja:"警察は橋に通じる通りを封鎖した。",answer:"barrent",choices:["barrent","ferment","bloquent","arrêtent"],hint:"barrer は「遮断する」。La rue est barrée à cause de l'accident.（事故のために道路が封鎖されている）。"},
  {id:"p135-8",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"Nous (__) notre réunion à la semaine prochaine.",ja:"私たちは会議を来週に延期する。",answer:"remettons",choices:["remettons","reportons","repoussons","continuons"],hint:"remettre は「戻す、延期する」。Il a remis son départ à la semaine prochaine.（彼は出発を来週に延ばした）。"},
  {id:"p135-9",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"La phrase (__) par quel mot ?",ja:"文はどの語で始まりますか？",answer:"commence",choices:["commence","finit","reprend","continue"],hint:"commencer par + 名詞[不定詞]で「…を〜から始める」。Il a commencé son dîner par le dessert.（彼は夕食をデザートから食べ始めた）。"},
  {id:"p135-10",theme:"開始・断続",exercice:"Ex.10",date:"5/10",fr:"(__) ton dessin, il est trop sale !",ja:"絵をやり直しなさい、汚すぎる！",answer:"Recommence",choices:["Recommence","Refais","Reprends","Termine"],hint:"recommencer は「やり直す、再開する」。Ton devoir est à recommencer.（君の宿題はやり直す必要がある）。"},

  /* --- 開閉・進み・関連 (5/10) --- */
  {id:"p137-1",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Pour exporter, ce pays (__) des États-Unis.",ja:"輸出するために、この国はアメリカに頼っている。",answer:"dépend",choices:["dépend","correspond","cause","tarder"],hint:"dépendre de（…次第である、に依存する）。A a besoin de B = B dépend de A という言い換え。"},
  {id:"p137-2",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Cette politique financière (__) des troubles dans les petites entreprises.",ja:"この財政政策は中小企業にトラブルをもたらした。",answer:"a causé",choices:["a causé","a provoqué","a ouvert","a résulté"],hint:"causer は「…の原因となる（= provoquer）」。Cette nouvelle m'a causé bien des soucis.（そのニュースを聞いて私はとても心配になった）。"},
  {id:"p137-3",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Il (__) à se décider.",ja:"彼は長い間決断するのが遅れた。",answer:"a tardé",choices:["a tardé","a hésité","a continué","a tardé"],hint:"tarder à + 不定詞で「…するのに手間どる」。Il ne va pas tarder.（もうじきそうなる）。"},
  {id:"p137-4",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Le président (__) la cérémonie par son discours.",ja:"大統領は挨拶でその式典を開いた。",answer:"a ouvert",choices:["a ouvert","a commencé","a inauguré","a fermé"],hint:"ouvrir は「開く（= commencer）」。Son petit discours a ouvert la réunion.（彼女の短い挨拶で会議が始まった）。"},
  {id:"p137-5",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Pierre (__) avec son frère qui vit en Espagne.",ja:"ピエールはスペインに住む弟と連絡をとっている。",answer:"correspond",choices:["correspond","communique","cause","convient"],hint:"correspondre avec qn で「（人）と連絡をとる、文通する」。"},
  {id:"p137-6",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Ce château (__) de 1710.",ja:"この城は1710年のものだ。",answer:"date",choices:["date","dure","provient","résulte"],hint:"dater de …に（さかのぼる）。Ce château date du XVe siècle.（この城は15世紀のものだ）。"},
  {id:"p137-7",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Ça fait huit jours que l'ascenseur ne (__) pas.",ja:"エレベーターが1週間止まっている。",answer:"marche",choices:["marche","fonctionne","tourne","avance"],hint:"marcher は「歩く、（機械が）機能する」。Mon ordinateur marche bien [mal].（私のパソコンは調子がよい[悪い]）。"},
  {id:"p137-8",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"De gros embouteillages dans la ville (__) de l'énorme chute de neige.",ja:"市内の大渋滞は大雪によるものだった。",answer:"ont résulté",choices:["ont résulté","ont causé","ont provoqué","ont découlé"],hint:"résulter de …の結果として生じる（= provenir）。Sa réussite au bac résulte de son bachotage.（彼のバカロレア合格は猛勉強のおかげだ）。"},
  {id:"p137-9",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Notre rendez-vous est pour six heures, si ça te (__) mieux.",ja:"都合がよければ6時の約束にしましょう。",answer:"convient",choices:["convient","plaire","marche","arrange"],hint:"convenir à …に都合がよい、適している（= plaire, préférer）。La date ne me convient pas.（その日は都合が悪い）。"},
  {id:"p137-10",theme:"開閉・進み・関連",exercice:"Ex.11",date:"5/10",fr:"Cet accident de la route (__) la mort d'un piéton.",ja:"この交通事故は歩行者1人の死を引き起こした。",answer:"a provoqué",choices:["a provoqué","a causé","a résulté","a entraîné"],hint:"provoquer はひき起こす（= causer）。Sa conduite en état d'ivresse a provoqué cet accident grave.（彼女の酔っぱらい運転がこの大事故の原因だった）。"},

  /* --- 動作（１） (5/10) --- */
  {id:"p139-1",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Bien qu'elle (__) de sa mère, elle est peu aimable.",ja:"母親に似ているけれど、彼女はあまり感じがよくない。",answer:"tienne",choices:["tienne","attrape","saute","lance"],hint:"tenir de qn で「（人）の血をひいている、（人）に似ている（= ressembler）」。Elle tient de sa mère.（彼女は母親似だ）。"},
  {id:"p139-2",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Cette actrice (__) une réplique.",ja:"この女優はセリフを忘れた。",answer:"a sauté",choices:["a sauté","a raté","a lancé","a perdu"],hint:"sauter は「飛びこえる」。Tu as sauté une phrase dans cette paragraphe.（この段落で1行飛ばしたよ）。"},
  {id:"p139-3",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Il ne faut pas (__) au sérieux tout ce qu'il nous raconte.",ja:"彼が話すことをすべて真に受けてはいけない。",answer:"prendre",choices:["prendre","tenir","lancer","attraper"],hint:"prendre qc au sérieux（= croire）で「…を真に受ける、信じる」。"},
  {id:"p139-4",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Je me suis dépêché, mais je n'ai pas pu (__) le dernier train.",ja:"急いだけれど、最終電車に乗れなかった。",answer:"attraper",choices:["attraper","prendre","tenir","sauter"],hint:"attraper は「捕まえる、間に合う」。attraper un dernier bus（← rater）で「最終バスに間に合う」。"},
  {id:"p139-5",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Renault (__) son nouveau modèle l'année prochaine.",ja:"ルノーは来年新モデルを売り出す。",answer:"lancera",choices:["lancera","présentera","mettra","sortira"],hint:"lancer は「投げる、発射する」。On va lancer un nouveau modèle de voiture.（= mettre en vente）で「新型車がまもなく売り出される」。"},
  {id:"p139-6",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Il faut absolument que tu (__) ta parole.",ja:"絶対に約束を守らなくてはいけない。",answer:"tiennes",choices:["tiennes","prennes","sautes","gardes"],hint:"tenir sa parole で「約束を守る」。Tu dois absolument faire ce que tu as dit = Il faut absolument que tu tiennes ta parole."},
  {id:"p139-7",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Attention ! Vous (__) de glisser sur une plaque de verglas.",ja:"注意！氷の上で滑る危険があります。",answer:"risquez",choices:["risquez","courez","prenez","tenez"],hint:"courir un danger [un risque]（= risquer）で「危険をおかす」。risquer de + 不定詞で「…する危険がある」。"},
  {id:"p139-8",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Le bruit (__) à l'époque que le directeur allait démissionner.",ja:"当時、所長が辞任しそうだという噂だった。",answer:"courait",choices:["courait","tenait","prenait","lançait"],hint:"Le bruit court que + 直説法で「…というウワサが広まっている」。courir には「（うわさなどが）広まる」の意味がある。"},
  {id:"p139-9",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Attendons sa présence à la réunion pour que (__) son projet.",ja:"彼が会議に出席するのを待って、彼の計画を明確にしよう。",answer:"se précise",choices:["se précise","se tienne","se prenne","se lance"],hint:"se préciser は「形をなす：固まる（= devenir plus précis）」。Notre projet a commencé à prendre forme.（私たちの計画は固まりはじめた）。"},
  {id:"p139-10",theme:"動作（１）",exercice:"Ex.12",date:"5/10",fr:"Pourquoi pleures-tu, qu'est-ce qui te (__) ?",ja:"なんで泣いているの、どうしたの？",answer:"prend",choices:["prend","tient","court","saute"],hint:"Qu'est-ce qui te prend ? で「いったいどうしたの？」（= Qu'est-ce que tu as ?）という慣用表現。"},

  /* --- 動作（２）・生活 (5/10) --- */
  {id:"p141-1",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"Cette théorie ne (__) sur rien.",ja:"この理論は何も根拠がない。",answer:"repose",choices:["repose","tourne","souffle","couche"],hint:"reposer sur …にもとづく（= être fondé）。Votre réclamation ne repose sur rien.（あなたの抗議には何の根拠もない）。"},
  {id:"p141-2",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"Demain soir, je (__) à l'hôtel.",ja:"明日の夜、私はホテルに泊まる。",answer:"couche",choices:["couche","loge","repose","tourne"],hint:"coucher à l'hôtel（= descendre）で「ホテルに泊まる」。"},
  {id:"p141-3",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"Le vent (__) très fort hier soir.",ja:"昨夜はとても風が強かった。",answer:"soufflait",choices:["soufflait","tournait","reposait","couchait"],hint:"souffler は「息を吹きかける、（風が）吹く（= produire un courant d'air）」。Le vent souffle fort du midi.（強い南風が吹いている）。"},
  {id:"p141-4",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"Je (__) les mains.",ja:"私はこの問題と関わらない。（手を引く）",answer:"m'en lave",choices:["m'en lave","me couche","me repose","me tourne"],hint:"s'en laver les mains で「…から手をひく（関わりを断つ）」という慣用表現。"},
  {id:"p141-5",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"Notre discussion (__) autour de l'éducation des enfants.",ja:"私たちの討論は子どもの教育問題をめぐって展開した。",answer:"tourne",choices:["tourne","souffle","repose","couche"],hint:"tourner autour de qc/qn で「…をめぐって展開する」。Leur conversation a tourné autour de cette question.（彼らの会話はその問題をめぐって展開した）。"},
  {id:"p141-6",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"Un ami m'(__) pour la nuit.",ja:"友人が一晩泊めてくれた。",answer:"a logé",choices:["a logé","a couché","a habillé","a veillé"],hint:"loger は「泊める」。Elle a logé une amie pour la nuit.（彼女はその夜友だちを泊めてやった）。"},
  {id:"p141-7",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"La situation politique (__) à s'améliorer.",ja:"政治状況は好転しつつある。",answer:"tend",choices:["tend","tourne","veille","habille"],hint:"tendre à + 不定詞で「…する傾向がある（= avoir tendance à）」。Le prix de l'essence tend à augmenter.（ガソリンの価格は上昇傾向にある）。"},
  {id:"p141-8",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"(__) à fermer la porte à clé en sortant.",ja:"外出するときは鍵をかけることを忘れないようにしなさい。",answer:"Veillez",choices:["Veillez","Habillez","Reposez","Couchez"],hint:"veiller à + 不定詞で「…するように気をつける（= faire attention à）」。Veille à ne pas oublier notre promesse.（約束を忘れないように気をつけてね）。"},
  {id:"p141-9",theme:"動作（２）・生活",exercice:"Ex.13",date:"5/10",fr:"Sa réponse me (__) à penser qu'il ment.",ja:"彼の返答から彼は嘘をついていると思う。",answer:"pousse",choices:["pousse","tourne","veille","tend"],hint:"pousser qn à qc [+不定詞]（= inciter à）で「（人）を…するようにしむける」。Je ne sais pas ce qui l'a poussé à agir ainsi.（私にはなにが彼をそのような行動に駆りたてたのかわからない）。"},

/* =====================================================
   ANKIスタイル復習システム
   levels: new / again / fuzzy / perfect
   nextReview: ISO日付文字列 (YYYY-MM-DD)
===================================================== */
const STORAGE_KEY = 'bukken2_anki_v3';
const STAR_KEY = 'bukken2_star_v3';
let starSet = new Set();
function loadStars() {
  try { starSet = new Set(JSON.parse(localStorage.getItem(STAR_KEY) || '[]')); } catch(e) { starSet = new Set(); }
}
function saveStars() { localStorage.setItem(STAR_KEY, JSON.stringify([...starSet])); }
function toggleStar() {
  if (!deck[current]) return;
  const id = deck[current].id;
  if (starSet.has(id)) { starSet.delete(id); } else { starSet.add(id); }
  saveStars();
  updateStarBtn();
}
function toggleReviewStar() {
  if (!reviewDeck[reviewCurrent]) return;
  const id = reviewDeck[reviewCurrent].id;
  if (starSet.has(id)) { starSet.delete(id); } else { starSet.add(id); }
  saveStars();
  updateReviewStarBtn();
}
function updateStarBtn() {
  const btn = document.getElementById('star-btn');
  if (!btn) return;
  const id = deck[current] ? deck[current].id : null;
  btn.textContent = (id && starSet.has(id)) ? '⭐' : '☆';
  btn.title = (id && starSet.has(id)) ? 'スターを外す' : 'スターをつける';
}
function updateReviewStarBtn() {
  const btn = document.getElementById('r-star-btn');
  if (!btn) return;
  const id = reviewDeck[reviewCurrent] ? reviewDeck[reviewCurrent].id : null;
  btn.textContent = (id && starSet.has(id)) ? '⭐' : '☆';
  btn.title = (id && starSet.has(id)) ? 'スターを外す' : 'スターをつける';
}
let cardData = {}; // id -> {level, nextReview}

function loadCardData() {
  try { cardData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { cardData = {}; }
}
function saveCardData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cardData));
}
function todayStr() {
  return new Date().toISOString().slice(0,10);
}
function addDays(days) {
  const d = new Date(); d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function getCardInfo(id) {
  return cardData[id] || {level:'new', nextReview: todayStr()};
}
function setCardRating(id, rating) {
  const info = {level: rating};
  if (rating === 'again')   info.nextReview = todayStr();
  else if (rating === 'fuzzy')   info.nextReview = addDays(2);
  else if (rating === 'perfect') info.nextReview = addDays(7);
  cardData[id] = info;
  saveCardData();
}
function getDueQuestions(pool) {
  const today = todayStr();
  return pool.filter(q => {
    const info = getCardInfo(q.id);
    return info.level === 'new' || info.level === 'again' || info.nextReview <= today;
  });
}
function getLevelLabel(id) {
  const info = getCardInfo(id);
  if (info.level === 'new')     return {text:'新規',cls:'level-new'};
  if (info.level === 'again')   return {text:'再挑戦',cls:'level-again'};
  if (info.level === 'fuzzy')   return {text:'うろ覚え',cls:'level-soon'};
  if (info.level === 'perfect') return {text:'習得済み',cls:'level-learned'};
  return {text:'-',cls:'level-new'};
}

/* =====================================================
   タブ切り替え
===================================================== */
function switchTab(tab) {
  ['practice','review','stats'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      const tabs = ['practice','review','stats'];
      b.classList.toggle('active', tabs[i]===tab);
    });
  });
  if (tab==='review') updateReviewBanner();
  if (tab==='stats')  updateStats();
}

/* =====================================================
   練習モード
===================================================== */
let deck=[], current=0, okCount=0, ngCount=0, answered=false;

function getPool() {
  const theme = document.getElementById('theme-select').value;
  let qs = QUESTIONS;
  if (theme === 'star') return qs.filter(q => starSet.has(q.id));
  if (theme !== 'all') qs = qs.filter(q => q.theme === theme);
  return qs;
}

function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

function startPractice() {
  const pool = getPool();
  if (pool.length===0){alert('問題がありません。');return;}
  deck = shuffle(pool);
  current=0; okCount=0; ngCount=0;
  document.getElementById('finish-area').style.display='none';
  document.getElementById('main-area').style.display='block';
  showQuestion();
  updateHeaderCount();
}

function showQuestion() {
  if (current>=deck.length){showFinish();return;}
  answered=false;
  const q=deck[current];
  const lbl=getLevelLabel(q.id);

  document.getElementById('q-theme').textContent=q.theme+'　'+q.exercice;
  document.getElementById('q-num').textContent=(current+1)+' / '+deck.length;
  document.getElementById('q-fr').innerHTML=q.fr.replace('(__)','<span class="blank">　　　　</span>');
  document.getElementById('q-ja').textContent=q.ja;
  document.getElementById('result-row').innerHTML='';
  document.getElementById('anki-label').style.display='none';
  document.getElementById('anki-btns').style.display='none';
  document.getElementById('next-btn').style.display='none';
  updateStarBtn();

  const choices=shuffle([...q.choices]);
  const container=document.getElementById('choices');
  container.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=c;
    btn.onclick=()=>selectAnswer(btn, c===q.answer, q);
    container.appendChild(btn);
  });
  updateProgressBar();
  document.getElementById('s-due').textContent=getDueQuestions(getPool()).length;
}

function selectAnswer(btn, isCorrect, q) {
  if(answered)return; answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=true; if(b.textContent===q.answer)b.classList.add('correct');});
  const frAnswered=q.fr.replace('(__)','<strong>'+q.answer+'</strong>');
  const row=document.getElementById('result-row');
  if(isCorrect){btn.classList.add('correct');okCount++; row.innerHTML='<div class="result-box ok"><div class="result-msg ok">正解！</div><div class="result-hint">'+frAnswered+'<br>'+q.hint+'</div></div>';}
  else{btn.classList.add('wrong');ngCount++; row.innerHTML='<div class="result-box ng"><div class="result-msg ng">不正解</div><div class="result-hint">'+frAnswered+'<br>'+q.hint+'</div></div>';}
  document.getElementById('anki-label').style.display='block';
  document.getElementById('anki-btns').style.display='grid';
  updateProgressBar();
}

function ankiRate(rating) {
  setCardRating(deck[current].id, rating);
  current++;
  document.getElementById('anki-label').style.display='none';
  document.getElementById('anki-btns').style.display='none';
  showQuestion();
}

function nextCard(){current++;showQuestion();}

function updateProgressBar() {
  const total=deck.length;
  document.getElementById('s-remain').textContent=Math.max(0,total-current);
  document.getElementById('s-ok').textContent=okCount;
  document.getElementById('s-ng').textContent=ngCount;
  document.getElementById('prog').style.width=(total>0?Math.round(current/total*100):0)+'%';
}

function showFinish() {
  document.getElementById('main-area').style.display='none';
  document.getElementById('finish-area').style.display='block';
  const total=okCount+ngCount;
  const rate=total>0?Math.round(okCount/total*100):0;
  document.getElementById('finish-title').textContent='完了！　正解率 '+rate+'%';
  document.getElementById('finish-sub').textContent='正解 '+okCount+' / '+total+'問\n復習タブで苦手を克服しよう！';
}

function updateHeaderCount() {
  document.getElementById('header-right').textContent=QUESTIONS.length+'問収録';
  document.getElementById('word-count').textContent='収録問題数：'+QUESTIONS.length+'問';
}

/* =====================================================
   復習モード
===================================================== */
let reviewDeck=[], reviewCurrent=0, reviewDone=0;

function updateReviewBanner() {
  const due=getDueQuestions(QUESTIONS);
  document.getElementById('due-count').textContent=due.length;
}

function startReview() {
  const due=getDueQuestions(QUESTIONS);
  if(due.length===0){alert('今日の復習はありません！');return;}
  reviewDeck=shuffle(due); reviewCurrent=0; reviewDone=0;
  document.getElementById('review-done').style.display='none';
  document.getElementById('review-area').style.display='block';
  showReviewQuestion();
}

function showReviewQuestion() {
  if(reviewCurrent>=reviewDeck.length){showReviewDone();return;}
  const q=reviewDeck[reviewCurrent];
  const lbl=getLevelLabel(q.id);
  document.getElementById('rq-theme').textContent=q.theme+'　'+q.exercice;
  document.getElementById('rq-level').textContent=lbl.text;
  document.getElementById('rq-level').className='q-level '+lbl.cls;
  document.getElementById('rq-fr').innerHTML=q.fr.replace('(__)','<span class="blank">　　　　</span>');
  document.getElementById('rq-ja').textContent=q.ja;
  document.getElementById('r-result-row').innerHTML='';
  document.getElementById('r-anki-label').style.display='none';
  document.getElementById('r-anki-btns').style.display='none';
  answered=false;
  updateReviewStarBtn();

  const choices=shuffle([...q.choices]);
  const container=document.getElementById('r-choices');
  container.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=c;
    btn.onclick=()=>selectReviewAnswer(btn,c===q.answer,q);
    container.appendChild(btn);
  });
}

function selectReviewAnswer(btn,isCorrect,q){
  if(answered)return; answered=true;
  document.querySelectorAll('#r-choices .choice-btn').forEach(b=>{b.disabled=true;if(b.textContent===q.answer)b.classList.add('correct');});
  const frAnswered=q.fr.replace('(__)','<strong>'+q.answer+'</strong>');
  const row=document.getElementById('r-result-row');
  if(isCorrect){btn.classList.add('correct'); row.innerHTML='<div class="result-box ok"><div class="result-msg ok">正解！</div><div class="result-hint">'+frAnswered+'<br>'+q.hint+'</div></div>';}
  else{btn.classList.add('wrong'); row.innerHTML='<div class="result-box ng"><div class="result-msg ng">不正解</div><div class="result-hint">'+frAnswered+'<br>'+q.hint+'</div></div>';}
  document.getElementById('r-anki-label').style.display='block';
  document.getElementById('r-anki-btns').style.display='grid';
  reviewDone++;
}

function reviewAnkiRate(rating){
  setCardRating(reviewDeck[reviewCurrent].id,rating);
  reviewCurrent++;
  document.getElementById('r-anki-label').style.display='none';
  document.getElementById('r-anki-btns').style.display='none';
  showReviewQuestion();
  updateReviewBanner();
}

function showReviewDone(){
  document.getElementById('review-area').style.display='none';
  document.getElementById('review-done').style.display='block';
  document.getElementById('review-done-sub').textContent=reviewDone+'問を復習しました！\n明日もこのタブをチェックしてください。';
  updateReviewBanner();
}

/* =====================================================
   統計タブ
===================================================== */
function updateStats() {
  updateCountdown();
  const counts={new:0,again:0,fuzzy:0,perfect:0};
  QUESTIONS.forEach(q=>{const info=getCardInfo(q.id); counts[info.level]=(counts[info.level]||0)+1;});
  document.getElementById('level-dist').innerHTML=
    '<div class="level-row"><span>⭐ スター登録</span><span>'+starSet.size+'問</span></div>'+
    '<div class="level-row"><span><span class="level-dot" style="background:#f0f0f0;border:1px solid #ccc;"></span>新規（未学習）</span><span>'+counts.new+'問</span></div>'+
    '<div class="level-row"><span><span class="level-dot" style="background:#FDECEA;"></span>再挑戦（すぐ再出題）</span><span>'+counts.again+'問</span></div>'+
    '<div class="level-row"><span><span class="level-dot" style="background:#FFF3E0;"></span>うろ覚え（2日後）</span><span>'+counts.fuzzy+'問</span></div>'+
    '<div class="level-row"><span><span class="level-dot" style="background:#EAF7EE;"></span>習得済み（7日後）</span><span>'+counts.perfect+'問</span></div>';

  const today=todayStr();
  const upcoming={};
  QUESTIONS.forEach(q=>{
    const info=getCardInfo(q.id);
    if(info.level!=='new'&&info.level!=='again'){
      const d=info.nextReview; upcoming[d]=(upcoming[d]||0)+1;
    }
  });
  const sorted=Object.keys(upcoming).sort().slice(0,7);
  const ul=sorted.map(d=>'<div class="upcoming-item"><span>'+d+(d===today?' (今日)':'')+'</span><span>'+upcoming[d]+'問</span></div>').join('');
  document.getElementById('upcoming-list').innerHTML=ul||'<div style="font-size:12px;color:#aaa;padding:8px 0;">まだ復習予定がありません</div>';
}

/* =====================================================
   X投稿とカウントダウン
===================================================== */
function getDaysLeft() {
  const exam = new Date(2026, 5, 21);
  const today = new Date(); today.setHours(0,0,0,0); exam.setHours(0,0,0,0);
  return Math.max(0, Math.round((exam - today) / 86400000));
}
function postToX() {
  var daysLeft = getDaysLeft();
  var perfect = QUESTIONS.filter(function(q){ return getCardInfo(q.id).level === 'perfect'; }).length;
  var total = QUESTIONS.length;
  var examDate = new Date(2026, 5, 21);
  var m = examDate.getMonth() + 1;
  var d = examDate.getDate();
  var t = '仏検2級まであと' + daysLeft + '日！（' + m + '月' + d + '日）\n\n'
    + '穴埋め問題アプリで毎日コツコツ練習中\n'
    + '習得済み：' + perfect + ' / ' + total + '問\n\n'
    + '頭張ります！\n\n'
    + '#仏検2級 #フランス語学習 #仏検';
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(t), '_blank');
}
function updateCountdown() {
  const daysLeft = getDaysLeft();
  const el = document.getElementById('days-count');
  if (el) el.textContent = daysLeft;
  const perfect = QUESTIONS.filter(q => getCardInfo(q.id).level === 'perfect').length;
  const lc = document.getElementById('x-learned-count');
  const tc = document.getElementById('x-total-count');
  if (lc) lc.textContent = perfect;
  if (tc) tc.textContent = QUESTIONS.length;
}

/* =====================================================

loadCardData();
loadStars();
updateHeaderCount();
updateReviewBanner();
updateCountdown();
